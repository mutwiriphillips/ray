services:
  # --- Backend API -----------------------------------------------------------
  # DigitizeBiz — digitizes and manages business assets (web/app design, social
  # media, database management, company/business/sacco registration, payroll).
  # CitizenEase — digitizes and manages individual assets: a consultancy that
  # handles every eCitizen and county government service a person needs.
  - type: web
    name: skywalkers-backend
    runtime: node
    plan: free # no persistent disk on this tier — consultations.json resets on every deploy/restart, see note below
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.16.0
      # Set during the Blueprint creation flow — never commit the real value.
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Render generates and stores this for you.
      - key: JWT_SECRET
        generateValue: true
      # Resolves to the frontend's actual public URL once both services exist.
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: skywalkers-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # --- Frontend static site --------------------------------------------------
  - type: web
    name: skywalkers-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # SPA fallback so /admin, /digitizebiz, /citizenease work on direct load/refresh.
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Resolves to the backend's actual public URL — baked into the build at build time.
      - key: VITE_API_URL
        fromService:
          type: web
          name: skywalkers-backend
          envVarKey: RENDER_EXTERNAL_URL
